<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ida-tv-Setuptv-Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg-dark: #121921; --card-bg: #1c252e; --primary: #1a66ff; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; padding-bottom: 50px; }
        
        /* Авторизация */
        #authScreen { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg-dark); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-box { background: #fff; color: #333; padding: 30px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        #adminContent { display: none; }

        /* Статистика */
        .stat-box { border-radius: 15px; padding: 15px; text-align: center; height: 100%; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .bg-total { background: linear-gradient(135deg, #4b6cb7, #182848); }
        .bg-paid { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .bg-debt { background: linear-gradient(135deg, #cb2d3e, #ef473a); }
        .bg-money { background: linear-gradient(135deg, #f2994a, #f2c94c); color: #000 !important; }

        /* Провайдеры */
        .prov-badge { padding: 10px; border-radius: 12px; font-weight: bold; font-size: 11px; margin-bottom: 5px; text-align: center; display: flex; flex-direction: column; justify-content: center; min-height: 65px; }
        .bg-edem { background: #6f42c1; } .bg-yosso { background: #007bff; }
        .bg-uspeh { background: #fd7e14; } .bg-teamtv { background: #e83e8c; }
        .bg-alltv { background: #20c997; } .bg-teamclub { background: #17a2b8; }

        /* Форма */
        .form-container { background: #fff; color: #333; border-radius: 20px; padding: 25px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-main { width: 100%; padding: 14px; font-weight: bold; border-radius: 10px; border: none; color: #fff; transition: 0.3s; margin-top: 10px; }
        .btn-add-mode { background: var(--primary); }
        .btn-edit-mode { background: #28a745; display: none; }

        /* Таблица и Мобильная адаптация */
        @media (max-width: 992px) {
            .table-custom thead { display: none; }
            .table-custom, .table-custom tbody, .table-custom tr, .table-custom td { display: block; width: 100%; }
            .table-custom tr { background: var(--card-bg); margin-bottom: 15px; border-radius: 15px; padding: 15px; border: 1px solid #2c3b4a; }
            .table-custom td { border: none; padding: 8px 0; display: flex; justify-content: space-between; font-size: 14px; border-bottom: 1px solid #2c3b4a; text-align: right; }
            .table-custom td:last-child { border: none; margin-top: 10px; justify-content: center; }
            .table-custom td:before { content: attr(data-label); font-weight: bold; color: #adb5bd; text-align: left; margin-right: 20px; }
        }

        @media (min-width: 993px) {
            .table-custom { width: 100%; background: var(--card-bg); border-radius: 15px; overflow: hidden; border-collapse: collapse; }
            .table-custom th { background: #2c3b4a; padding: 12px; color: #adb5bd; font-size: 13px; text-align: left; }
            .table-custom td { padding: 12px; border-bottom: 1px solid #2c3b4a; font-size: 13px; vertical-align: middle; }
            .table-custom tr:hover { background: #2a3847; }
        }

        .btn-act { background: none; border: none; font-size: 18px; padding: 5px; cursor: pointer; }
        .ico-comm { color: #1a66ff; } .ico-edit { color: #ffc107; } .ico-del { color: #dc3545; }
        
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 11000; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="authScreen">
    <div class="login-box">
        <h3 class="mb-4">SetupTV Admin</h3>
        <input type="password" id="passInput" class="form-control form-control-lg mb-3 text-center" placeholder="Пароль">
        <button class="btn btn-primary btn-lg w-100" onclick="checkPass()">ВОЙТИ</button>
        <p id="errorMsg" class="text-danger mt-3 small" style="display:none;">Неверный пароль!</p>
    </div>
</div>

<div id="adminContent">
    <div class="container-fluid px-3 pt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3>Ida-tv-Setuptv-Admin</h3>
            <button class="btn btn-outline-danger btn-sm" onclick="logout()">Выход</button>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3"><div class="stat-box bg-total"><small>Клиентов</small><h4 id="stat-total">0</h4></div></div>
            <div class="col-6 col-md-3"><div class="stat-box bg-paid"><small>Оплачено</small><h4 id="stat-paid">0</h4></div></div>
            <div class="col-6 col-md-3"><div class="stat-box bg-debt"><small>Должники</small><h4 id="stat-unpaid">0</h4></div></div>
            <div class="col-6 col-md-3"><div class="stat-box bg-money"><small>Сумма</small><h4 id="stat-money">0 €</h4></div></div>
        </div>

        <div class="row g-2 text-center mb-4" id="provider-stats"></div>

        <div class="form-container">
            <h5 class="text-primary mb-3" id="form-title"><strong>+ Добавить клиента</strong></h5>
            <form id="mainForm" class="row g-2">
                <input type="hidden" id="edit_id">
                <div class="col-md-3"><input type="text" id="f_name" class="form-control" placeholder="Имя" required></div>
                <div class="col-md-3"><input type="text" id="f_phone" class="form-control" placeholder="Телефон"></div>
                <div class="col-md-3"><input type="text" id="f_nick" class="form-control" placeholder="Ник"></div>
                <div class="col-md-3"><input type="email" id="f_email" class="form-control" placeholder="Email"></div>
                <div class="col-md-3"><input type="number" id="f_amount" class="form-control" placeholder="Сумма (€)"></div>
                <div class="col-md-3"><input type="text" id="f_invoice" class="form-control" placeholder="Arve nr:"></div>
                <div class="col-md-3">
                    <select id="f_provider" class="form-select">
                        <option value="Edem.TV">Edem.TV</option>
                        <option value="Yosso.TV">Yosso.TV</option>
                        <option value="Uspeh.TV">Uspeh.TV</option>
                        <option value="Team.TV">Team.TV</option>
                        <option value="Alltv.club">Alltv.club</option>
                        <option value="Team.club">Team.club</option>
                    </select>
                </div>
                <div class="col-md-3"><input type="date" id="f_renew" class="form-control"></div>
                <div class="col-md-3">
                    <select id="f_status" class="form-select">
                        <option value="не оплачено">не оплачено</option>
                        <option value="Продлено">Продлено</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select id="f_resp" class="form-select">
                        <option value="Ilja">Ilja</option>
                        <option value="Artjom">Artjom</option>
                        <option value="Общий">Общий</option>
                    </select>
                </div>
                <div class="col-md-6"><input type="text" id="f_comment" class="form-control" placeholder="Комментарий"></div>
                <div class="col-12">
                    <button type="submit" id="btn-add" class="btn-main btn-add-mode">ДОБАВИТЬ КЛИЕНТА</button>
                    <button type="button" id="btn-save" class="btn-main btn-edit-mode" onclick="saveUpdate()">СОХРАНИТЬ ИЗМЕНЕНИЯ</button>
                </div>
            </form>
        </div>

        <div class="row g-2 mb-3">
            <div class="col-8 col-md-9"><input type="text" id="search" class="form-control bg-dark text-white border-secondary" placeholder="Поиск (Имя, Ник, Тел)..."></div>
            <div class="col-4 col-md-3">
                <select id="month" class="form-select bg-dark text-white border-secondary">
                    <option value="all">Все месяцы</option>
                    <option value="01">Январь</option><option value="02">Февраль</option>
                    <option value="03">Март</option><option value="04">Апрель</option>
                    <option value="05">Май</option><option value="06">Июнь</option>
                    <option value="07">Июль</option><option value="08">Август</option>
                    <option value="09">Сентябрь</option><option value="10">Октябрь</option>
                    <option value="11">Ноябрь</option><option value="12">Декабрь</option>
                </select>
            </div>
        </div>

        <table class="table-custom">
            <thead>
                <tr>
                    <th>Ник</th><th>Имя</th><th>Тел.</th><th>Email</th><th>Сумма</th><th>Arve</th><th>Пров.</th><th>Дата</th><th>Статус</th><th>Отв.</th><th>Действия</th>
                </tr>
            </thead>
            <tbody id="dataGrid"></tbody>
        </table>
    </div>
</div>

<div id="modalOverlay" onclick="this.style.display='none'">
    <div class="modal-box bg-white p-4 rounded-4 shadow" onclick="event.stopPropagation()" style="max-width: 90%; width: 400px; text-align: center;">
        <h5 class="text-primary mb-3">Комментарий</h5>
        <p id="modalMsg" class="text-dark" style="white-space: pre-wrap;"></p>
        <button class="btn btn-primary w-100 mt-3" onclick="document.getElementById('modalOverlay').style.display='none'">Закрыть</button>
    </div>
</div>

<script>
    const ADMIN_PASS = '@Ser82ik99bor@'; 
    const S_URL = 'https://lrzebfypiyuqziitivpm.supabase.co'; 
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxyemViZnlwaXl1cXppaXRpdnBtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjcxNTMsImV4cCI6MjA4OTQwMzE1M30.Ht-kwqBWH66xG0J_OQUvXKxXrWQIdxfq8O6KWVHBMws';
    const T_NAME = 'Ida-tv-Setuptv-Admin';

    const supabaseClient = supabase.createClient(S_URL, S_KEY);
    let cache = [];

    function checkPass() {
        if(document.getElementById('passInput').value === ADMIN_PASS) {
            sessionStorage.setItem('isAuth', 'true');
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            load();
        } else { document.getElementById('errorMsg').style.display = 'block'; }
    }

    if(sessionStorage.getItem('isAuth') === 'true') {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('adminContent').style.display = 'block';
        load();
    }

    function logout() { sessionStorage.removeItem('isAuth'); location.reload(); }

    async function load() {
        const { data, error } = await supabaseClient.from(T_NAME).select('*').order('id', { ascending: false });
        if (!error) { cache = data; draw(data); }
    }

    function draw(list) {
        const tbody = document.getElementById('dataGrid');
        tbody.innerHTML = '';
        let s = { t: list.length, p: 0, m: 0, pr: { "Edem.TV":0, "Yosso.TV":0, "Uspeh.TV":0, "Team.TV":0, "Alltv.club":0, "Team.club":0 } };
        const colors = { "Edem.TV":"bg-edem", "Yosso.TV":"bg-yosso", "Uspeh.TV":"bg-uspeh", "Team.TV":"bg-teamtv", "Alltv.club":"bg-alltv", "Team.club":"bg-teamclub" };

        list.forEach(c => {
            if(c.paymentstatus === 'Продлено') { s.p++; s.m += parseFloat(c.amount || 0); }
            if(s.pr[c.provider] !== undefined) s.pr[c.provider]++;

            tbody.innerHTML += `<tr>
                <td data-label="Ник"><b>${c.nickname || '-'}</b></td>
                <td data-label="Имя">${c.name || '-'}</td>
                <td data-label="Тел.">${c.phone || '-'}</td>
                <td data-label="Email">${c.email || '-'}</td>
                <td data-label="Сумма">${c.amount || 0}€</td>
                <td data-label="Arve">${c.invoice || '-'}</td>
                <td data-label="Провайдер"><span class="badge ${colors[c.provider]}">${c.provider}</span></td>
                <td data-label="Дата">${c.renewdate || '-'}</td>
                <td data-label="Статус"><span class="badge ${c.paymentstatus === 'Продлено' ? 'bg-success' : 'bg-danger'}">${c.paymentstatus}</span></td>
                <td data-label="Отв.">${c.responsible || '-'}</td>
                <td>
                    <button class="btn-act ico-comm" onclick="showMsg('${c.comment || 'Нет комментария'}')">💬</button>
                    <button class="btn-act ico-edit" onclick="startEdit(${c.id})">✏️</button>
                    <button class="btn-act ico-del" onclick="remove(${c.id})">🗑️</button>
                </td>
            </tr>`;
        });
        document.getElementById('stat-total').innerText = s.t;
        document.getElementById('stat-paid').innerText = s.p;
        document.getElementById('stat-unpaid').innerText = s.t - s.p;
        document.getElementById('stat-money').innerText = s.m + ' €';

        const pList = document.getElementById('provider-stats');
        pList.innerHTML = '';
        for(let p in s.pr) {
            pList.innerHTML += `<div class="col-4 col-md-2"><div class="prov-badge ${colors[p]}"><div>${p}</div><h4>${s.pr[p]}</h4></div></div>`;
        }
    }

    function filterData() {
        const query = document.getElementById('search').value.toLowerCase();
        const month = document.getElementById('month').value;
        const filtered = cache.filter(c => {
            const matchesSearch = (c.name || '').toLowerCase().includes(query) || (c.nickname || '').toLowerCase().includes(query) || (c.phone || '').includes(query);
            const matchesMonth = month === 'all' || (c.renewdate && c.renewdate.split('-')[1] === month);
            return matchesSearch && matchesMonth;
        });
        draw(filtered);
    }
    document.getElementById('search').oninput = filterData;
    document.getElementById('month').onchange = filterData;

    document.getElementById('mainForm').onsubmit = async (e) => {
        e.preventDefault();
        const data = {
            name: document.getElementById('f_name').value, phone: document.getElementById('f_phone').value,
            nickname: document.getElementById('f_nick').value, email: document.getElementById('f_email').value,
            amount: document.getElementById('f_amount').value, invoice: document.getElementById('f_invoice').value,
            provider: document.getElementById('f_provider').value, renewdate: document.getElementById('f_renew').value,
            paymentstatus: document.getElementById('f_status').value, responsible: document.getElementById('f_resp').value,
            comment: document.getElementById('f_comment').value
        };
        await supabaseClient.from(T_NAME).insert([data]);
        document.getElementById('mainForm').reset();
        load();
    }

    function startEdit(id) {
        const c = cache.find(x => x.id === id);
        document.getElementById('edit_id').value = c.id;
        document.getElementById('f_name').value = c.name || '';
        document.getElementById('f_phone').value = c.phone || '';
        document.getElementById('f_nick').value = c.nickname || '';
        document.getElementById('f_email').value = c.email || '';
        document.getElementById('f_amount').value = c.amount || '';
        document.getElementById('f_invoice').value = c.invoice || '';
        document.getElementById('f_provider').value = c.provider;
        document.getElementById('f_renew').value = c.renewdate || '';
        document.getElementById('f_status').value = c.paymentstatus;
        document.getElementById('f_resp').value = c.responsible || 'Общий';
        document.getElementById('f_comment').value = c.comment || '';
        document.getElementById('btn-add').style.display = 'none';
        document.getElementById('btn-save').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function saveUpdate() {
        const id = document.getElementById('edit_id').value;
        const data = {
            name: document.getElementById('f_name').value, phone: document.getElementById('f_phone').value,
            nickname: document.getElementById('f_nick').value, email: document.getElementById('f_email').value,
            amount: document.getElementById('f_amount').value, invoice: document.getElementById('f_invoice').value,
            provider: document.getElementById('f_provider').value, renewdate: document.getElementById('f_renew').value,
            paymentstatus: document.getElementById('f_status').value, responsible: document.getElementById('f_resp').value,
            comment: document.getElementById('f_comment').value
        };
        await supabaseClient.from(T_NAME).update(data).eq('id', id);
        document.getElementById('mainForm').reset();
        document.getElementById('btn-add').style.display = 'block';
        document.getElementById('btn-save').style.display = 'none';
        load();
    }

    async function remove(id) { if(confirm('Удалить?')) { await supabaseClient.from(T_NAME).delete().eq('id', id); load(); } }
    function showMsg(t) { document.getElementById('modalMsg').innerText = t; document.getElementById('modalOverlay').style.display = 'flex'; }
</script>
</body>
</html>
